name: RotinaPlus
options:
  bundleIdPrefix: com.rotinaplus
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  RotinaPlus:
    type: application
    platform: iOS
    sources:
      - path: RotinaPlus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rotinaplus.app
        INFOPLIST_KEY_CFBundleDisplayName: RotinaPlus
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: RotinaPlus/Info.plist
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0

schemes:
  RotinaPlus:
    build:
      targets:
        RotinaPlus: all
    run:
      config: Debug
