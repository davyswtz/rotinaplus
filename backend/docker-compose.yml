services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rotinaplus_app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    networks:
      - rotinaplus

  nginx:
    image: nginx:1.27-alpine
    container_name: rotinaplus_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - rotinaplus

  mysql:
    image: mysql:8.0
    container_name: rotinaplus_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-rotinaplus}
      MYSQL_USER: ${DB_USERNAME:-rotinauser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "3306:3306"
    volumes:
      - rotinaplus_mysql_data:/var/lib/mysql
    networks:
      - rotinaplus

  redis:
    image: redis:7-alpine
    container_name: rotinaplus_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - rotinaplus

  adminer:
    image: adminer:4
    container_name: rotinaplus_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - rotinaplus

networks:
  rotinaplus:
    driver: bridge

volumes:
  rotinaplus_mysql_data:
